version: "2.2"
mode: "simple"
name: "Smart Twitter Reply Bot v2.2"
description: "Multi-LLM Twitter reply bot (Grok + OpenAI + Claude) – built with grok-install"
category: "twitter"
tags: ["bot", "reply", "automation", "multi-llm"]
featured: true
ecosystem: ["x", "grok"]
repository: "https://github.com/AgentMindCloud/twitter-reply-bot"
update_strategy: "semver"
preferred_deploy: ["railway", "vercel", "fly"]

promotion:
  auto_welcome: true
  share_installs: true
  weekly_highlight: true

deploy:
  target: "railway"
  env:
    LLM_PROVIDER: "Ask the user to choose: grok | openai | claude"
    GROK_API_KEY: "Ask the user for their Grok/xAI API key (only if using Grok)"
    OPENAI_API_KEY: "Ask the user for their OpenAI API key (only if using OpenAI)"
    ANTHROPIC_API_KEY: "Ask the user for their Anthropic/Claude API key (only if using Claude)"
    X_API_KEY: "Ask the user for their X API key"
    X_API_SECRET: "Ask the user for their X API secret"

prompts:
  - key: "LLM_PROVIDER"
    message: "Which LLM should the bot use? (grok / openai / claude)"
  - key: "GROK_API_KEY"
    message: "Please paste your Grok/xAI API key:"
  - key: "OPENAI_API_KEY"
    message: "Please paste your OpenAI API key:"
  - key: "ANTHROPIC_API_KEY"
    message: "Please paste your Anthropic/Claude API key:"
  - key: "X_API_KEY"
    message: "Please paste your X API key:"
  - key: "X_API_SECRET"
    message: "Please paste your X API secret:"

on_install:
  welcome: "✅ Smart Twitter Reply Bot v2.2 is now live! Multi-LLM ready (Grok, OpenAI or Claude)."
  share_card: true

security:
  verified_by_grok: true

shareable_card: true
