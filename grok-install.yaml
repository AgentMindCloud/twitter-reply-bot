version: "2.0"
mode: "simple"
name: "Smart Twitter Reply Bot"
description: "AI agent that replies to mentions intelligently (X-first)"
category: "twitter"
tags: ["bot", "reply", "automation"]
ecosystem: ["x", "grok"]
repository: "https://github.com/AgentMindCloud/twitter-reply-bot"
update_strategy: "semver"
preferred_deploy: ["railway", "vercel", "fly"]

deploy:
  target: "railway"
  env:
    X_API_KEY: "Ask the user for their X API key"
    X_API_SECRET: "Ask the user for their X API secret"
    GROK_API_KEY: "Ask the user for their Grok API key"

prompts:
  - key: "X_API_KEY"
    message: "Please paste your X API key:"
  - key: "X_API_SECRET"
    message: "Please paste your X API secret:"
  - key: "GROK_API_KEY"
    message: "Please paste your Grok API key:"

error_handlers:
  missing_env: "Oops! Looks like you forgot to provide the X API key. Want me to guide you again?"
  invalid_key: "That API key doesn't look right. Let's try entering it again."
  deployment_failed: "Deployment hit a snag. Want me to try again?"

on_install:
  welcome: "Welcome to Smart Twitter Reply Bot! Your agent is now live and ready to reply to mentions."
  suggested_commands:
    - "/status"
    - "/tweets"
    - "/help"
  share_card: true

security:
  verified_by_grok: true
