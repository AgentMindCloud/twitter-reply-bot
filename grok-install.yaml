# grok-install.yaml – twitter-reply-bot (v2.11)
# Now fully X-native reply bot with Phase 10 features

version: "2.11"
name: "Smart Twitter Reply Bot"
description: "Native X reply bot that intelligently responds to mentions using Grok. Full X-native runtime."
repository: "https://github.com/AgentMindCloud/twitter-reply-bot"
category: "x-native"
tags: ["reply-bot", "x", "twitter", "automation", "grok"]
featured: true
ecosystem: ["grok", "x"]

# === PHASE 10 NEW BLOCKS ===
# Native X Agent Runtime (Goal 1)
x_native_runtime:
  type: "reply-bot"
  permissions: ["tweet.read", "tweet.write"]
  grok_orchestrator: true
  one_click_x_deploy: true

# Grok Intelligence Layer (Goal 2)
intelligence_layer:
  function_calling: true
  real_time_tools: true
  multi_agent_swarm: true
  grok_coordinates: true
  ai_suggested_teams: true

# Advanced Trust & Reputation (Goal 3)
reputation:
  public_score: true
  verified_by_grok: true
  scan_history: true
  automated_recommendations: true

# Safety & Verification 2.0 (from Phase 9 – kept unchanged)
safety:
  pre_install_scan: true
  verified_by_grok: true
  scan_summary_visible: true
  minimum_keys_only: true

# Orchestration & Triggers (from previous phases – kept and slightly extended)
orchestration:
  enabled: true
  role: "source"
  can_trigger: ["hermes-telegram-dashboard"]
  can_be_triggered_by: []
  visual_builder: true
  ai_suggested_patterns: true
  triggers:
    - event: "mention"
      action: "reply_with_grok"
      target_agents: ["hermes"]

llm:
  provider: "xai"
  model: "grok-4"
  api_key_env: "GROK_API_KEY"

environment:
  variables:
    GROK_API_KEY:
      description: "Your Grok / xAI API key (required for native X reply functionality)"
      required: true
      secret: true
    X_API_KEY:
      description: "Optional X API key for advanced permissions"
      required: false
      secret: true

deployment:
  preferred: ["railway", "docker"]
  targets:
    - railway
    - docker

# Credits (strongly recommended)
credits:
  standard: "grok-install"
  author: "@JanSol0s"
  url: "https://github.com/AgentMindCloud/grok-install"
  version: "2.11"
  message: "Powered by grok-install open standard"
